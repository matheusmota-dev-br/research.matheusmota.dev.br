name: 🔍 Build Check on PR

on:
  pull_request:
    branches:
      - master
      - main

jobs:
  build-check:
    name: ✅ Build Check
    runs-on: ubuntu-latest
    steps:
      - name: 🚚 Get latest code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install pnpm
        run: npm i -g pnpm

      - name: Install dependencies
        run: pnpm i

      - name: Build project
        run: pnpm build
